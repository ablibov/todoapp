{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List-{{task.title}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="{% static 'favicon4.svg' %}">
</head>
<body>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

body, html {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    font-weight: 900;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;

    background: linear-gradient(26deg,
    rgba(63,94,251,1) 0%,
    rgba(255,84,84,1) 100%);

    overflow: hidden;
}

.task-card {
    width: 70%;
    min-height: 350px;
    padding: 40px;

    background: linear-gradient(210deg, #833AB4 0%, #FD1D1D 50%, #FCB045 100%);
    border-radius: 35px;
    color: white;

    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
}

.task-card h1 {
    font-size: 48px;
    margin: 0 0 25px;
}

.description {
    font-size: 24px;
    margin-bottom: 30px;
}

.date {
    opacity: 0.85;
}

.completed {
    color: #00ff99;
    font-size: 24px;
}

.not-completed {
    color: #ffdddd;
    font-size: 24px;
}

.back {
    border-radius: 20px;
    border: none;
    padding: 14px 25px;
    background-color: black;
    color: white;
    cursor: pointer;
}

#delete {
    position: fixed;
    bottom: 25px;
    left: 25px;

    background-color: rgba(255, 84, 84, 1);
    padding: 22px;
    border-radius: 15px;
    color: white;
    text-decoration: none;
}

#delete i {
    font-size: 25px;
}

.status-block {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 30px;
    font-size: 24px;
}

.switch {
    position: relative;
    display: inline-block;
    width: 65px;
    height: 35px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,.3);
    border-radius: 40px;
    transition: .3s;
}

.slider::before {
    content: "";
    position: absolute;
    width: 27px;
    height: 27px;
    left: 4px;
    top: 4px;
    background: white;
    border-radius: 50%;
    transition: .3s;
}

input:checked + .slider {
    background: #00ff99;
}

input:checked + .slider::before {
    transform: translateX(30px);
}

    </style>

<div class="task-card">
    <h1>Task: {{ task.title }}</h1>

    <p class="description">{{ task.description }}</p>

    <p class="date">Created At: {{ task.created_at }}</p>

    {% if task.complited %}
        <p class="completed">Completed</p>
    {% else %}
        <p class="not-completed">Not Completed</p>
    {% endif %}

    <div class="status-block">
    <span>Status:</span>

    <form method="POST" action="{% url 'change_status' task.id %}">
        {% csrf_token %}

        <label class="switch">
            <input type="checkbox"
                   onchange="this.form.submit()"
                   {% if task.complited %}checked{% endif %}>
            <span class="slider"></span>
        </label>
    </form>
</div>

    <button class="back" onclick="window.history.back();" type="button">Back</button>
</div>

<a id="delete" href="{% url 'delete' task.id %}">
    <i class="fa-solid fa-trash"></i>
</a>



</body>
</html>
